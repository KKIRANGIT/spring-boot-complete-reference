global:
  scrape_interval: 15s

scrape_configs:
  # These targets assume the five Spring Boot services run on the host machine during local development.
  # From inside Docker, host.docker.internal is the stable way to reach those host ports on Mac/Windows.
  # The Prometheus service also declares an extra_hosts mapping so Linux Docker can resolve the same name.
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: account-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
