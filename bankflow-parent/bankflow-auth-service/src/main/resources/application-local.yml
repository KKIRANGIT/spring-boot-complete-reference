server:
  port: ${SERVER_PORT:8081}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bankflow_auth}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD}}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: 900
  refresh-expiration: 604800
