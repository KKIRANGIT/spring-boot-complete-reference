server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bankflow_auth}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD}}
    hikari:
      # 10 connections is enough for local development. Production sizing follows workload and hardware.
      maximum-pool-size: 10
  jpa:
    hibernate:
      # Local only. Production should use Flyway/Liquibase migrations instead of ddl-auto updates.
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: 900
  refresh-expiration: 604800
