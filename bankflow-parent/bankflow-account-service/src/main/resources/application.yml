spring:
  application:
    name: bankflow-account-service
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bankflow_account}
    username: ${DB_USERNAME:${MYSQL_USER:root}}
    password: ${DB_PASSWORD:${MYSQL_ROOT_PASSWORD:bankflow_root}}
    hikari:
      # Ten connections is enough for local development and avoids wasting memory on a laptop.
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      # Local development convenience only. Production should use Flyway or Liquibase migrations.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:bankflow_redis}
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: account-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.bankflow.common.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      # Manual ack means Kafka offsets are committed only after the saga step finishes safely.
      ack-mode: manual_immediate

server:
  port: ${SERVER_PORT:8082}

cache:
  account:
    ttl: 300
  balance:
    ttl: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
