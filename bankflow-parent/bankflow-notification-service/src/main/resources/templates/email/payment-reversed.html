<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; color: #1a202c;">
  <h2 style="color: #9b2c2c;">Transfer Reversed</h2>
  <p>Your transfer could not be completed and the amount has been returned to your account.</p>
  <table style="width:100%; border-collapse:collapse;">
    <tr>
      <td style="padding:8px 0;"><strong>Amount</strong></td>
      <td style="padding:8px 0;" th:text="'INR ' + ${amount}"></td>
    </tr>
    <tr>
      <td style="padding:8px 0;"><strong>From Account</strong></td>
      <td style="padding:8px 0;" th:text="${fromAccount}"></td>
    </tr>
    <tr>
      <td style="padding:8px 0;"><strong>Reference</strong></td>
      <td style="padding:8px 0;" th:text="${reference}"></td>
    </tr>
    <tr>
      <td style="padding:8px 0;"><strong>Date &amp; Time</strong></td>
      <td style="padding:8px 0;" th:text="${timestamp}"></td>
    </tr>
  </table>
  <p style="color:#666; font-size:12px;">
    No action is required from you. The amount has been restored automatically.
  </p>
</body>
</html>
